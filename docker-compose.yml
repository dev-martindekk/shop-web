services:
  web:
    build: .
    container_name: ezshop-web
    restart: unless-stopped
    environment:
      DATABASE_URL: mysql://ezshop:ezshop_pass@db:3306/ezshop
      JWT_SECRET: ezshop-dev-secret-change-me-in-production-7f2a91
    ports:
      - "3000:3000"
    volumes:
      - ezshop_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: ezshop-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ezshop_root
      MYSQL_DATABASE: ezshop
      MYSQL_USER: ezshop
      MYSQL_PASSWORD: ezshop_pass
    ports:
      - "3309:3306"
    volumes:
      - ezshop_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pezshop_root"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ezshop_mysql_data:
  ezshop_uploads:
